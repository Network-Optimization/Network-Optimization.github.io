<div class="site-effects" aria-hidden="true">
  <canvas id="network-canvas" aria-hidden="true"></canvas>
  <div class="bg-mesh" aria-hidden="true"></div>
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-aurora" aria-hidden="true">
    <span class="bg-aurora__band bg-aurora__band--1"></span>
    <span class="bg-aurora__band bg-aurora__band--2"></span>
    <span class="bg-aurora__band bg-aurora__band--3"></span>
  </div>
  <div class="mouse-glow" id="mouse-glow" aria-hidden="true"></div>
  <div class="ambient-bg" aria-hidden="true">
    <span class="ambient-bg__orb ambient-bg__orb--1"></span>
    <span class="ambient-bg__orb ambient-bg__orb--2"></span>
    <span class="ambient-bg__orb ambient-bg__orb--3"></span>
    <span class="ambient-bg__orb ambient-bg__orb--4"></span>
  </div>
</div>
<button class="back-to-top" id="back-to-top" type="button" aria-label="Back to top" title="Back to top">
  <span aria-hidden="true">↑</span>
</button>
<div class="peek-eyes" id="peek-eyes" aria-hidden="true">
  <div class="peek-eyes__face">
    <div class="peek-eyes__eye peek-eyes__eye--left">
      <span class="peek-eyes__pupil"></span>
      <span class="peek-eyes__shine"></span>
    </div>
    <div class="peek-eyes__eye peek-eyes__eye--right">
      <span class="peek-eyes__pupil"></span>
      <span class="peek-eyes__shine"></span>
    </div>
  </div>
</div>
